<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Spammer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0b0f1a; font-family: 'Inter', sans-serif; }
    .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
    .glow { box-shadow: 0 0 40px rgba(99, 102, 241, 0.15); }
    .animate-pulse-slow { animation: pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 20px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-3xl glass rounded-3xl p-6 md:p-8 glow border border-white/10">

    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl md:text-3xl font-bold text-white tracking-tight">
        ⚡ <span class="bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">OTP Spammer</span>
      </h1>
      <span class="text-xs text-white/30 bg-white/5 px-3 py-1 rounded-full">v3.0</span>
    </div>

    <p class="text-white/40 text-sm mb-6">Masukkan 1–3 nomor WhatsApp (08xxx). Spam dikirim via IP Anda.</p>

    <div id="inputContainer" class="space-y-3">
      <div class="phone-input flex gap-2">
        <input type="text" class="phone-field flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="08123456789">
        <button onclick="removePhone(this)" class="text-white/30 hover:text-red-400 transition px-2">✕</button>
      </div>
      <div class="phone-input flex gap-2">
        <input type="text" class="phone-field flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="08123456789">
        <button onclick="removePhone(this)" class="text-white/30 hover:text-red-400 transition px-2">✕</button>
      </div>
      <div class="phone-input flex gap-2">
        <input type="text" class="phone-field flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="08123456789">
        <button onclick="removePhone(this)" class="text-white/30 hover:text-red-400 transition px-2">✕</button>
      </div>
    </div>

    <div class="flex flex-wrap gap-3 mt-4">
      <button onclick="addPhone()" class="text-sm text-indigo-400 hover:text-indigo-300 transition border border-indigo-500/30 px-4 py-2 rounded-xl">+ Tambah Nomor</button>
      <button onclick="clearAll()" class="text-sm text-white/30 hover:text-white/50 transition px-4 py-2">Clear</button>
    </div>

    <button id="spamBtn" onclick="startSpam()" class="w-full mt-6 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-semibold py-3.5 rounded-xl transition-all glow disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2">
      <span id="btnText">🚀 Kirim Spam</span>
      <span id="btnLoader" class="hidden animate-spin">⏳</span>
    </button>

    <div id="resultContainer" class="mt-6 space-y-3 max-h-96 overflow-y-auto"></div>

  </div>

  <script>
    const API_URL = '/api/spam';

    function addPhone() {
      const container = document.getElementById('inputContainer');
      const div = document.createElement('div');
      div.className = 'phone-input flex gap-2';
      div.innerHTML = `
        <input type="text" class="phone-field flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition" placeholder="08123456789">
        <button onclick="removePhone(this)" class="text-white/30 hover:text-red-400 transition px-2">✕</button>
      `;
      container.appendChild(div);
    }

    function removePhone(btn) {
      const inputs = document.querySelectorAll('.phone-input');
      if (inputs.length > 1) {
        btn.parentElement.remove();
      }
    }

    function clearAll() {
      document.querySelectorAll('.phone-field').forEach(inp => inp.value = '');
      document.getElementById('resultContainer').innerHTML = '';
    }

    function getPhones() {
      const fields = document.querySelectorAll('.phone-field');
      return Array.from(fields).map(f => f.value.trim()).filter(v => v.length > 0);
    }

    function setLoading(loading) {
      const btn = document.getElementById('spamBtn');
      const text = document.getElementById('btnText');
      const loader = document.getElementById('btnLoader');
      btn.disabled = loading;
      if (loading) {
        text.textContent = 'Mengirim...';
        loader.classList.remove('hidden');
      } else {
        text.textContent = '🚀 Kirim Spam';
        loader.classList.add('hidden');
      }
    }

    function renderResult(data) {
      const container = document.getElementById('resultContainer');
      let html = '';

      data.details.forEach((item, idx) => {
        html += `
          <div class="glass rounded-xl p-4 border border-white/5">
            <div class="flex justify-between items-center mb-2">
              <span class="text-white font-mono text-sm">📱 ${item.phone}</span>
              <span class="text-sm ${item.success > 0 ? 'text-emerald-400' : 'text-red-400'}">
                ✅ ${item.success} / ❌ ${item.failed}
              </span>
            </div>
            <div class="flex flex-wrap gap-1 mt-2">
              ${item.results.map(r => `<span class="text-xs px-2 py-1 rounded-full bg-white/5 text-white/60">${r.status} ${r.hostname}</span>`).join('')}
            </div>
          </div>
        `;
      });

      html += `
        <div class="glass rounded-xl p-4 border border-indigo-500/20 text-center">
          <span class="text-white/70 text-sm">🌐 IP Client: <span class="text-indigo-300 font-mono">${data.client_ip}</span></span>
          <span class="block text-white/40 text-xs mt-1">Total Sukses: ${data.summary.total_success} / ${data.summary.total_success + data.summary.total_failed}</span>
        </div>
      `;

      container.innerHTML = html;
    }

    async function startSpam() {
      const phones = getPhones();
      if (phones.length === 0) {
        alert('Masukkan minimal 1 nomor!');
        return;
      }
      if (phones.length > 3) {
        alert('Maksimal 3 nomor!');
        return;
      }

      setLoading(true);
      document.getElementById('resultContainer').innerHTML = '';

      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phones })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderResult(data);
      } catch (err) {
        document.getElementById('resultContainer').innerHTML = `
          <div class="glass rounded-xl p-4 border border-red-500/30 text-red-400 text-center">❌ Error: ${err.message}</div>
        `;
      } finally {
        setLoading(false);
      }
    }
  </script>

</body>
</html>
