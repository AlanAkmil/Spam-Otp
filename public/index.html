<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Spammer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center p-4">
  <div class="bg-gray-800 rounded-2xl p-6 max-w-lg w-full shadow-2xl">
    <h1 class="text-2xl font-bold text-white text-center mb-2">⚡ OTP Spammer</h1>
    <p class="text-gray-400 text-sm text-center mb-6">1-3 nomor, spam via IP kamu</p>

    <div id="inputContainer" class="space-y-3">
      <input type="text" class="phone-field w-full bg-gray-700 text-white rounded-lg px-4 py-2 placeholder-gray-400" placeholder="08123456789">
      <input type="text" class="phone-field w-full bg-gray-700 text-white rounded-lg px-4 py-2 placeholder-gray-400" placeholder="08123456789">
      <input type="text" class="phone-field w-full bg-gray-700 text-white rounded-lg px-4 py-2 placeholder-gray-400" placeholder="08123456789">
    </div>

    <button onclick="startSpam()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg mt-4 transition disabled:opacity-50" id="spamBtn">
      🚀 Kirim Spam
    </button>

    <div id="result" class="mt-4 space-y-3"></div>
  </div>

  <script>
    async function startSpam() {
      const btn = document.getElementById('spamBtn');
      const fields = document.querySelectorAll('.phone-field');
      const phones = Array.from(fields).map(f => f.value.trim()).filter(v => v.length > 0);
      
      if (phones.length === 0 || phones.length > 3) {
        alert('Masukkan 1-3 nomor');
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳ Mengirim...';
      document.getElementById('result').innerHTML = '<p class="text-gray-400 text-center">⏳ Proses spam, mohon tunggu...</p>';

      try {
        const res = await fetch('/api/spam', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phones })
        });
        const data = await res.json();
        
        if (data.error) throw new Error(data.error);

        let html = `<div class="bg-gray-700 p-3 rounded-lg text-gray-300 text-sm">
          🌐 IP: ${data.client_ip}<br>
          ✅ Sukses: ${data.summary.total_success} | ❌ Gagal: ${data.summary.total_failed}
        </div>`;

        data.details.forEach(item => {
          html += `<div class="bg-gray-700 p-3 rounded-lg">
            <div class="flex justify-between text-white">
              <span>📱 ${item.phone}</span>
              <span class="${item.success > 0 ? 'text-green-400' : 'text-red-400'}">✅ ${item.success} ❌ ${item.failed}</span>
            </div>
            <div class="flex flex-wrap gap-1 mt-1">
              ${item.results.map(r => `<span class="text-xs px-2 py-0.5 bg-gray-600 rounded text-gray-300">${r.status} ${r.hostname}</span>`).join('')}
            </div>
          </div>`;
        });

        document.getElementById('result').innerHTML = html;
      } catch (e) {
        document.getElementById('result').innerHTML = `<p class="text-red-400 text-center">❌ ${e.message}</p>`;
      } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Kirim Spam';
      }
    }
  </script>
</body>
</html>
